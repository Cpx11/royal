<style>
  :root{
    --bg:#0a040d;
    --bg-2:#140820;
    --surface:#1c0d28;
    --surface-2:#28133a;
    --burgundy:#4a0e22;
    --plum:#3a0f45;
    --ink:#f4ead8;
    --ink-soft:#c9b89a;
    --muted:#7a6a5a;
    --line:rgba(212,175,55,0.18);
    --line-strong:rgba(212,175,55,0.4);
    --gold:#d4af37;
    --gold-deep:#9b7a23;
    --gold-light:#ecd078;
    --cream:#f4ead8;
    --shadow:0 30px 80px -30px rgba(0,0,0,0.7);
    --display:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
    --rail:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  img{max-width:100%;display:block}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--gold);color:var(--bg)}
  /* ===== DESKTOP RAIL (unique to laptop view) ===== */
  .rail{
    position:fixed;top:0;left:0;bottom:0;width:var(--rail);
    background:linear-gradient(180deg,var(--bg-2),var(--bg));
    border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:24px 0;z-index:60;
  }
  .rail-mark{
    width:42px;height:42px;border-radius:50%;
    background:linear-gradient(135deg,var(--plum),var(--burgundy));
    color:var(--gold);font-family:var(--display);font-size:24px;font-weight:700;
    display:grid;place-items:center;
    box-shadow:inset 0 0 0 1px var(--gold),0 8px 24px -8px rgba(212,175,55,.5);
  }
  .rail-text{
    writing-mode:vertical-rl;transform:rotate(180deg);
    font-size:10px;letter-spacing:.6em;text-transform:uppercase;color:var(--gold);
    font-weight:600;
  }
  .rail-social{display:flex;flex-direction:column;gap:14px;font-size:11px;color:var(--ink-soft)}
  .rail-social a{writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:.3em;text-transform:uppercase;transition:color .2s}
  .rail-social a:hover{color:var(--gold)}
  .shell{margin-left:var(--rail)}
  /* ===== NAV (desktop floats; mobile is its own bar) ===== */
  .nav{position:sticky;top:0;z-index:50;background:rgba(10,4,13,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 36px}
  .nav-brand{display:none;font-family:var(--display);font-size:18px;color:var(--cream);letter-spacing:.04em}
  .nav-brand em{font-style:italic;color:var(--gold)}
  .nav-links{list-style:none;display:flex;align-items:center;gap:34px}
  .nav-links a{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);transition:color .2s;position:relative}
  .nav-links a::after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:1px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}
  .nav-links a:hover{color:var(--gold)}
  .nav-links a:hover::after{transform:scaleX(1)}
  .btn-ghost{border:1px solid var(--gold);color:var(--gold)!important;padding:10px 20px;border-radius:999px;font-size:12px;letter-spacing:.12em;transition:all .25s}
  .btn-ghost:hover{background:var(--gold);color:var(--bg)!important}
  .btn-ghost::after{display:none!important}
  .nav-toggle{display:none;background:none;border:0;font-size:22px;cursor:pointer;color:var(--gold);width:42px;height:42px;border-radius:50%;border:1px solid var(--line)}
  .container{width:min(1200px,calc(100% - 56px));margin:0 auto}
  /* ===== HERO — asymmetric split (desktop) / stacked editorial (mobile) ===== */
  .hero{position:relative;overflow:hidden;padding:80px 0 120px}
